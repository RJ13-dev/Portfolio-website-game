<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Font Style Preview · Rijul Sobti Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&family=Nunito:wght@400;600;800;900&family=Nunito+Sans:wght@400;600;700&family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Outfit:wght@400;500;700;800&family=Work+Sans:wght@400;500;600&family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;600;700;800&family=Instrument+Serif&family=Geist:wght@400;500;700&family=Lexend:wght@400;500;700;800&family=Schibsted+Grotesk:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --olive:#5a6b3a; --green:#36862d; --deep:#173d22; --mint:#9ce5df;
    --cream:#f2f0e6; --ink:#1b3d38; --gold:#F0D590;
    --glass:rgba(255,255,255,.12); --glass-border:rgba(255,255,255,.22);
  }
  *{box-sizing:border-box}
  body{
    margin:0; color:var(--cream); padding:40px 20px 80px;
    background:
      radial-gradient(circle at 14% 0%,rgba(116,124,78,.72),transparent 34%),
      radial-gradient(circle at 79% 10%,rgba(54,134,45,.84),transparent 38%),
      linear-gradient(145deg,var(--olive) 0%,var(--green) 38%,var(--deep) 100%);
    background-attachment:fixed; min-height:100vh;
    font-family:"Inter",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1080px;margin:0 auto}
  header.page{text-align:center;margin-bottom:14px}
  header.page h1{font-family:"Poppins",sans-serif;font-weight:800;font-size:clamp(2rem,5vw,3rem);margin:0 0 8px;letter-spacing:-.03em}
  header.page p{opacity:.82;max-width:620px;margin:0 auto;line-height:1.6}
  .hint{display:inline-block;margin-top:14px;padding:8px 16px;border-radius:999px;background:var(--glass);border:1px solid var(--glass-border);font-size:.85rem}

  .grid{display:grid;gap:24px;margin-top:36px}
  .card{
    background:var(--glass);border:1px solid var(--glass-border);
    border-radius:24px;padding:30px 32px;backdrop-filter:blur(14px);
  }
  .card .tag{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:22px}
  .card .name{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:1.05rem;color:var(--gold);letter-spacing:.02em}
  .card .fonts{font-size:.78rem;opacity:.7;font-family:"Space Grotesk",monospace}
  .card .vibe{font-size:.78rem;opacity:.85;background:rgba(0,0,0,.18);padding:5px 12px;border-radius:999px}

  .sample .eyebrow{text-transform:uppercase;letter-spacing:.22em;font-size:.72rem;opacity:.7;margin:0 0 10px}
  .sample h2{margin:0 0 6px;font-size:clamp(2rem,4.5vw,3.2rem);line-height:1.02;letter-spacing:-.03em}
  .sample h3{margin:0 0 16px;font-size:1.35rem;font-weight:600;opacity:.95;letter-spacing:-.01em}
  .sample p{margin:0 0 20px;line-height:1.7;max-width:62ch;opacity:.92;font-size:1rem}
  .sample .row{display:flex;gap:30px;flex-wrap:wrap;align-items:flex-end}
  .stat b{display:block;font-size:2.2rem;line-height:1;letter-spacing:-.04em}
  .stat span{font-size:.78rem;opacity:.7;text-transform:uppercase;letter-spacing:.12em}
  .btn{display:inline-block;padding:11px 22px;border-radius:999px;background:var(--gold);color:#2a2310;font-weight:700;text-decoration:none;font-size:.95rem}

  /* per-pairing font roles */
  .p-current .t{font-family:"Nunito",Arial,sans-serif;font-weight:900}      .p-current .b{font-family:"Inter",sans-serif}
  .p-poppins .t{font-family:"Poppins",sans-serif;font-weight:800}           .p-poppins .b{font-family:"Inter",sans-serif}
  .p-fraunces .t{font-family:"Fraunces",serif;font-weight:600}              .p-fraunces .b{font-family:"Inter",sans-serif}
  .p-sora .t{font-family:"Sora",sans-serif;font-weight:800}                 .p-sora .b{font-family:"Space Grotesk",sans-serif}
  .p-bricolage .t{font-family:"Bricolage Grotesque",sans-serif;font-weight:800} .p-bricolage .b{font-family:"DM Sans",sans-serif}
  .p-outfit .t{font-family:"Outfit",sans-serif;font-weight:800}             .p-outfit .b{font-family:"Work Sans",sans-serif}
  .p-dmserif .t{font-family:"DM Serif Display",serif;font-weight:400}       .p-dmserif .b{font-family:"DM Sans",sans-serif}
  .p-jakarta .t{font-family:"Plus Jakarta Sans",sans-serif;font-weight:800} .p-jakarta .b{font-family:"Plus Jakarta Sans",sans-serif}
  .p-nunito .t{font-family:"Nunito",sans-serif;font-weight:900}             .p-nunito .b{font-family:"Nunito Sans",sans-serif}
  .p-instrument .t{font-family:"Instrument Serif",serif;font-weight:400}    .p-instrument .b{font-family:"Geist",sans-serif}
  .p-lexend .t{font-family:"Lexend",sans-serif;font-weight:800}            .p-lexend .b{font-family:"Manrope",sans-serif}
  .p-schibsted .t{font-family:"Schibsted Grotesk",sans-serif;font-weight:800} .p-schibsted .b{font-family:"Inter",sans-serif}
</style>
</head>
<body>
<div class="wrap">
  <header class="page">
    <h1>Font Style Preview</h1>
    <p>Each option below shows a heading + body pairing rendered in your portfolio's actual colors and layout, so you can judge them in context. Pick the one you like and I'll apply it to the site.</p>
    <div class="hint">Currently using: <b>Arial Rounded MT Bold</b> (titles) + <b>Inter</b> (body)</div>
  </header>

  <div class="grid" id="grid"></div>
</div>

<script>
const pairings = [
  {cls:"p-current",  name:"0 · Closest to current",  fonts:"Nunito + Inter",                vibe:"rounded · friendly (your current vibe)"},
  {cls:"p-poppins",  name:"1 · Poppins",             fonts:"Poppins + Inter",               vibe:"geometric · clean · approachable"},
  {cls:"p-fraunces", name:"2 · Fraunces",            fonts:"Fraunces + Inter",              vibe:"editorial · warm · characterful"},
  {cls:"p-sora",     name:"3 · Sora",                fonts:"Sora + Space Grotesk",          vibe:"modern · techy · confident"},
  {cls:"p-bricolage",name:"4 · Bricolage Grotesque", fonts:"Bricolage Grotesque + DM Sans", vibe:"trendy · expressive · designy"},
  {cls:"p-outfit",   name:"5 · Outfit",              fonts:"Outfit + Work Sans",            vibe:"sleek · minimal · startup"},
  {cls:"p-dmserif",  name:"6 · DM Serif Display",    fonts:"DM Serif Display + DM Sans",    vibe:"elegant · high-contrast · premium"},
  {cls:"p-jakarta",  name:"7 · Plus Jakarta Sans",   fonts:"Plus Jakarta Sans (single)",    vibe:"unified · polished · neutral"},
  {cls:"p-nunito",   name:"8 · Nunito family",       fonts:"Nunito + Nunito Sans",          vibe:"soft · rounded · welcoming"},
  {cls:"p-instrument",name:"9 · Instrument Serif",   fonts:"Instrument Serif + Geist",      vibe:"editorial · airy · refined"},
  {cls:"p-lexend",   name:"10 · Lexend",             fonts:"Lexend + Manrope",              vibe:"readable · calm · accessible"},
  {cls:"p-schibsted",name:"11 · Schibsted Grotesk",  fonts:"Schibsted Grotesk + Inter",     vibe:"bold · editorial · contemporary"},
];

const grid = document.getElementById("grid");
pairings.forEach(p=>{
  const el = document.createElement("div");
  el.className = "card " + p.cls;
  el.innerHTML = `
    <div class="tag">
      <span class="name">${p.name}</span>
      <span class="fonts">${p.fonts}</span>
      <span class="vibe">${p.vibe}</span>
    </div>
    <div class="sample">
      <p class="eyebrow b">Hi, I'm</p>
      <h2 class="t">Rijul Sobti</h2>
      <h3 class="t">Software Engineer & Builder</h3>
      <p class="b">I design and ship full-stack products — from clean APIs to playful interfaces. Lately I've been working on portfolio tooling, small games, and developer experience. The quick brown fox jumps over the lazy dog. 0123456789</p>
      <div class="row">
        <div class="stat"><b class="t">12+</b><span class="b">Projects</span></div>
        <div class="stat"><b class="t">3 yrs</b><span class="b">Experience</span></div>
        <div class="stat"><b class="t">∞</b><span class="b">Ideas</span></div>
        <a class="btn b" href="#">View work</a>
      </div>
    </div>`;
  grid.appendChild(el);
});
</script>
</body>
</html>
